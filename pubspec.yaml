
name: logmonitor_flutter
description: >
  The official Flutter SDK for Logmonitor.io. Captures logs, print() calls,
  debugPrint() output, and Flutter errors — then streams them to your
  dashboard in real-time.
version: 0.2.0
homepage: https://logmonitor.io
repository: https://github.com/panarastudios/logmonitor_flutter
issue_tracker: https://github.com/panarastudios/logmonitor_flutter/issues
topics:
  - logging
  - monitoring
  - error-handling
  - debugging
  - observability

environment:
  sdk: ^3.10.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  logging: ^1.3.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
